site_name: RSDiff
site_description: Official PyTorch implementation of RSDiff — a T5-conditioned cascaded diffusion model for text-to-satellite-image generation.
site_url: https://asebaq.github.io/rsdiff
site_author: Ahmad Sebaq
repo_url: https://github.com/asebaq/rsdiff
repo_name: asebaq/rsdiff
edit_uri: edit/main/docs/site/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/asebaq/rsdiff
    - icon: fontawesome/brands/python
      link: https://huggingface.co/asebaq

nav:
  - Home: index.md
  - Method: method.md
  - Results: results.md
  - Usage: usage.md
  - Cite: citation.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: Copyright &copy; 2024-2026 Ahmad Sebaq &mdash; Apache 2.0
